# A1: ArgoCD test playbook — pause + resume on mgmt1
# secondary=mgmt1 because standalone test does pause+resume on same hub
acm_switchover_hubs:
  primary:
    context: mgmt1
    kubeconfig: ~/.kube/config
  secondary:
    context: mgmt1
    kubeconfig: ~/.kube/config
acm_switchover_features:
  argocd:
    manage: true
    resume_after_switchover: true
acm_switchover_argocd:
  namespace: openshift-gitops
acm_switchover_execution:
  mode: execute
  run_id: "e2e-argocd-test-001"
