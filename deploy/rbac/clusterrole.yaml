---
# ClusterRole for ACM Switchover Operator
# Provides baseline switchover permissions without decommission deletes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acm-switchover-operator
  labels:
    app.kubernetes.io/name: acm-switchover
    app.kubernetes.io/component: operator
    app.kubernetes.io/role: operator
rules:
  # Core API - Namespace validation (list needed for cluster-wide namespace discovery in preflight)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  
  # Core API - Nodes (for cluster health validation per runbook)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  
  # OpenShift Config API - ClusterOperators (for cluster health validation)
  - apiGroups: ["config.openshift.io"]
    resources: ["clusteroperators"]
    verbs: ["get", "list"]
  
  # OpenShift Config API - ClusterVersions (for upgrade status check)
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get", "list"]
  
  # ACM Cluster Management - ManagedClusters
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["managedclusters"]
    verbs: ["get", "list", "patch"]
  
  # Hive - ClusterDeployment validation
  - apiGroups: ["hive.openshift.io"]
    resources: ["clusterdeployments"]
    verbs: ["get", "list"]
  
  # ACM Operator - Hub detection
  - apiGroups: ["operator.open-cluster-management.io"]
    resources: ["multiclusterhubs"]
    verbs: ["get", "list"]
  
  # Observability - Auto-detection
  - apiGroups: ["observability.open-cluster-management.io"]
    resources: ["multiclusterobservabilities"]
    verbs: ["get", "list"]

  # Argo CD - Detection and pause/resume (auto-detected, --argocd-manage)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["argocds"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]

---
# ClusterRole for ACM Switchover Validator (Read-Only)
# Provides read-only permissions for validation and dry-run operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acm-switchover-validator
  labels:
    app.kubernetes.io/name: acm-switchover
    app.kubernetes.io/component: validator
    app.kubernetes.io/role: validator
rules:
  # Core API - Namespace validation (list needed for cluster-wide namespace discovery in preflight)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  
  # Core API - Nodes (for cluster health validation per runbook)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  
  # OpenShift Config API - ClusterOperators (for cluster health validation)
  - apiGroups: ["config.openshift.io"]
    resources: ["clusteroperators"]
    verbs: ["get", "list"]
  
  # OpenShift Config API - ClusterVersions (for upgrade status check)
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get", "list"]
  
  # ACM Cluster Management - ManagedClusters (read-only)
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["managedclusters"]
    verbs: ["get", "list"]
  
  # Hive - ClusterDeployment validation
  - apiGroups: ["hive.openshift.io"]
    resources: ["clusterdeployments"]
    verbs: ["get", "list"]
  
  # ACM Operator - Hub detection
  - apiGroups: ["operator.open-cluster-management.io"]
    resources: ["multiclusterhubs"]
    verbs: ["get", "list"]
  
  # Observability - Auto-detection
  - apiGroups: ["observability.open-cluster-management.io"]
    resources: ["multiclusterobservabilities"]
    verbs: ["get", "list"]

  # Argo CD - Detection only (auto-detected, read-only)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["argocds"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
