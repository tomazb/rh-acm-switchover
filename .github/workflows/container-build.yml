name: Build and Push Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  # Disabled for PRs - re-enable when tag generation is fixed
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:

env:
  QUAY_REGISTRY: quay.io
  QUAY_IMAGE_NAME: tomazborstnar/acm-switchover
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/acm-switchover

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Container Image
    runs-on: ubuntu-latest
    outputs:
      publish_quay: ${{ steps.registry-targets.outputs.publish_quay }}
      primary_image: ${{ steps.registry-targets.outputs.primary_image }}
      primary_image_ref: ${{ steps.registry-targets.outputs.primary_image_ref }}
    permissions:
      contents: read
      packages: write
      id-token: write  # For cosign signing
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine registry targets
        id: registry-targets
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          set -euo pipefail

          publish_quay=false
          images="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          primary_image="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          primary_tag="latest"

          if [[ -n "${QUAY_USERNAME}" && -n "${QUAY_PASSWORD}" ]]; then
            publish_quay=true
            images="${QUAY_REGISTRY}/${QUAY_IMAGE_NAME}"$'\n'"${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
            primary_image="${QUAY_REGISTRY}/${QUAY_IMAGE_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "::warning::QUAY_USERNAME/QUAY_PASSWORD are not set; skipping Quay publish and continuing with GHCR only."
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            primary_tag="${GITHUB_REF_NAME}"
          fi

          {
            echo "publish_quay=${publish_quay}"
            echo "primary_image=${primary_image}"
            echo "primary_image_ref=${primary_image}:${primary_tag}"
            echo "images<<EOF"
            echo "${images}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request' && steps.registry-targets.outputs.publish_quay == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry-targets.outputs.images }}
          tags: |
            # Tag as 'latest' on main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Version tags from git tags (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Major.minor tags (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Major tags (v1.0.0 -> 1)
            type=semver,pattern={{major}}
            # Short SHA for commits
            type=sha,prefix={{branch}}-,format=short
          labels: |
            org.opencontainers.image.title=ACM Switchover
            org.opencontainers.image.description=Automated ACM Hub Switchover Tool
            org.opencontainers.image.vendor=Red Hat
            org.opencontainers.image.authors=Platform Engineering
            org.opencontainers.image.licenses=MIT

      - name: Build and push container image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./container-bootstrap/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build-and-push.outputs.digest }}

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.registry-targets.outputs.primary_image_ref }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.registry-targets.outputs.primary_image_ref }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed to:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Digest: ${{ steps.build-and-push.outputs.digest }}"

  test-container:
    name: Test Container Image
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./container-bootstrap/Containerfile
          load: true
          tags: acm-switchover:test
          cache-from: type=gha

      - name: Test - Help command
        run: |
          docker run --rm acm-switchover:test --help

      - name: Test - Version check
        run: |
          docker run --rm acm-switchover:test --version || echo "Version flag may not exist yet"

      - name: Test - Python dependencies
        run: |
          docker run --rm acm-switchover:test python3 -c "import kubernetes, yaml, rich; print('Dependencies OK')"

      - name: Test - CLI tools availability
        run: |
          docker run --rm acm-switchover:test sh -c "oc version --client && jq --version"

      - name: Test - Non-root user
        run: |
          docker run --rm acm-switchover:test sh -c "id && test \$(id -u) -eq 1001"

      - name: Test - Permissions
        run: |
          docker run --rm acm-switchover:test sh -c "ls -la /var/lib/acm-switchover && touch /var/lib/acm-switchover/test.txt"

      - name: Run Trivy vulnerability scanner on test image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'acm-switchover:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  publish-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Prepare release notes
        id: release-notes
        env:
          PUBLISH_QUAY: ${{ needs.build-and-push.outputs.publish_quay }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          ## Container Images

          Available registries:

          \`\`\`bash
          # GitHub Container Registry
          podman pull ghcr.io/${GHCR_IMAGE_NAME}:${GITHUB_REF_NAME}
          EOF

          if [[ "${PUBLISH_QUAY}" == "true" ]]; then
            cat >> release-notes.md <<EOF

          # Quay.io
          podman pull quay.io/${QUAY_IMAGE_NAME}:${GITHUB_REF_NAME}
          EOF
          fi

          cat >> release-notes.md <<EOF
          \`\`\`

          ### Multi-Architecture Support
          - linux/amd64
          - linux/arm64

          ### Verification
          \`\`\`bash
          # Verify signature (cosign)
          cosign verify ghcr.io/${GHCR_IMAGE_NAME}:${GITHUB_REF_NAME}
          EOF

          if [[ "${PUBLISH_QUAY}" == "true" ]]; then
            cat >> release-notes.md <<EOF
          cosign verify quay.io/${QUAY_IMAGE_NAME}:${GITHUB_REF_NAME}
          EOF
          fi

          cat >> release-notes.md <<EOF
          \`\`\`

          ### Usage
          \`\`\`bash
          podman run -it --rm \\
            -v ~/.kube:/app/.kube:ro \\
            -v ./state:/var/lib/acm-switchover \\
            ghcr.io/${GHCR_IMAGE_NAME}:${GITHUB_REF_NAME} \\
            --validate-only \\
            --primary-context primary-hub \\
            --secondary-context secondary-hub
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sbom.spdx.json
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
