---
# Simulates a switchover interrupted after activation.
# The run_checkpoint_fixture writes a pre-existing checkpoint file with
# completed_phases: [preflight, primary_prep, activation] before running
# the playbook.  The scenario verifies that the remaining phases
# (post_activation, finalization) are executed and recorded in the checkpoint.

acm_switchover_hubs:
  primary:
    context: primary-hub
    kubeconfig: ./kubeconfigs/primary
  secondary:
    context: secondary-hub
    kubeconfig: ./kubeconfigs/secondary

acm_switchover_operation:
  method: passive
  activation_method: patch
  old_hub_action: secondary

acm_switchover_execution:
  mode: execute
  report_dir: ./artifacts
  checkpoint:
    enabled: true
    backend: file
    # path is overridden at runtime by run_checkpoint_fixture

acm_switchover_features:
  manage_auto_import_strategy: false
  skip_rbac_validation: true
  skip_observability_checks: true
  argocd:
    manage: false
    resume_after_switchover: false

acm_primary_mch_info:
  resources:
    - metadata:
        name: multiclusterhub
      status:
        currentVersion: 2.14.3

acm_secondary_mch_info:
  resources:
    - metadata:
        name: multiclusterhub
      status:
        currentVersion: 2.14.1

acm_primary_namespace_info:
  resources:
    - metadata:
        name: open-cluster-management
    - metadata:
        name: open-cluster-management-backup

acm_secondary_namespace_info:
  resources:
    - metadata:
        name: open-cluster-management
    - metadata:
        name: open-cluster-management-backup

acm_primary_cluster_deployments_info:
  resources:
    - metadata:
        name: cluster-a

acm_primary_managed_cluster_backups_info:
  resources:
    - metadata:
        name: cluster-a-backup

acm_primary_backups_info:
  resources:
    - metadata:
        name: acm-backup-20240101

acm_primary_backup_schedules_info:
  resources:
    - metadata:
        name: acm-hub-backup
      spec:
        paused: false

acm_primary_bsl_info:
  resources:
    - metadata:
        name: acm-bsl
      status:
        phase: Available

acm_secondary_bsl_info:
  resources:
    - metadata:
        name: acm-bsl
      status:
        phase: Available

acm_secondary_restore_info:
  resources:
    - metadata:
        name: restore-acm-passive-sync

acm_secondary_restores_info:
  resources:
    - metadata:
        name: restore-acm-passive-sync
      spec:
        syncRestoreWithNewBackups: true
      status:
        phase: Enabled

acm_secondary_managed_clusters_info:
  resources:
    - metadata:
        name: cluster-a
      status:
        conditions:
          - type: ManagedClusterJoined
            status: "True"
          - type: ManagedClusterConditionAvailable
            status: "True"

acm_secondary_backup_schedules_info:
  resources:
    - metadata:
        name: acm-hub-backup
      spec:
        paused: true
