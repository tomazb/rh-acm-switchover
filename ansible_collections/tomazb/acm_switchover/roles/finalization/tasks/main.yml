---
- name: Enter checkpointed phase
  tomazb.acm_switchover.checkpoint_phase:
    phase: finalization
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: enter
  register: _checkpoint_enter
  when: acm_switchover_execution.checkpoint.enabled | default(false)

- name: Run finalization phase
  when: not ((_checkpoint_enter | default({})).skipped_phase | default(false))
  block:
    - name: Enable backup schedules on new hub
      ansible.builtin.include_tasks: enable_backups.yml

    - name: Verify backup schedules on new hub
      ansible.builtin.include_tasks: verify_backups.yml

    - name: Verify MultiClusterHub health
      ansible.builtin.include_tasks: verify_mch.yml

    - name: Handle old hub disposition
      ansible.builtin.include_tasks: handle_old_hub.yml

    - name: Resume Argo CD auto-sync when enabled
      ansible.builtin.include_role:
        name: tomazb.acm_switchover.argocd_manage
      vars:
        acm_switchover_argocd:
          mode: resume
          run_id: "{{ acm_switchover_execution.run_id | default('unknown') }}"
      when: acm_switchover_features.argocd.resume_after_switchover | default(false)

    - name: Publish finalization result
      ansible.builtin.set_fact:
        acm_switchover_finalization_result:
          phase: finalization
          status: pass
          changed: true
          old_hub_action: "{{ acm_switchover_operation.old_hub_action | default('secondary') }}"
          enable_backups: "{{ acm_switchover_enable_backups_result | default({}) }}"
      tags:
        - finalization
  rescue:
    - name: Mark checkpoint failure
      tomazb.acm_switchover.checkpoint_phase:
        phase: finalization
        checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
        status: fail
        error: "{{ ansible_failed_result.msg | default('unknown failure') }}"
      when: acm_switchover_execution.checkpoint.enabled | default(false)

    - name: Re-raise failure
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('Phase finalization failed') }}"

- name: Mark checkpoint phase completion
  # No file artifact for finalization; report_ref not applicable
  tomazb.acm_switchover.checkpoint_phase:
    phase: finalization
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: pass
  when:
    - acm_switchover_execution.checkpoint.enabled | default(false)
    - not ((_checkpoint_enter | default({})).skipped_phase | default(false))
