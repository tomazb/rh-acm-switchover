---
- name: Read existing passive restore on old hub (if any)
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1beta1
    kind: Restore
    name: restore-acm-passive-sync
    namespace: open-cluster-management-backup
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
  register: _old_hub_restore_info
  when: (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'

# The existing restore is considered "stale" when it was previously activated
# (veleroManagedClustersBackupName=latest). A stale restore must be deleted so
# the next activation can trigger a fresh managed-cluster Velero restore.
- name: Delete stale active restore on old hub
  kubernetes.core.k8s:
    api_version: cluster.open-cluster-management.io/v1beta1
    kind: Restore
    name: restore-acm-passive-sync
    namespace: open-cluster-management-backup
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
    state: absent
  when:
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - (_old_hub_restore_info.resources | default([]) | length) > 0
    - (_old_hub_restore_info.resources[0].spec.veleroManagedClustersBackupName | default('skip')) != 'skip'
  register: _old_hub_restore_deleted

- name: Create passive sync restore on old hub
  kubernetes.core.k8s:
    api_version: cluster.open-cluster-management.io/v1beta1
    kind: Restore
    name: restore-acm-passive-sync
    namespace: open-cluster-management-backup
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1beta1
      kind: Restore
      metadata:
        name: restore-acm-passive-sync
        namespace: open-cluster-management-backup
      spec:
        cleanupBeforeRestore: CleanupRestored
        restoreSyncInterval: 10m
        syncRestoreWithNewBackups: true
        veleroManagedClustersBackupName: skip
        veleroCredentialsBackupName: latest
        veleroResourcesBackupName: latest
  when:
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - >-
      (_old_hub_restore_info.resources | default([]) | length) == 0
      or (_old_hub_restore_deleted.changed | default(false))
  register: _old_hub_restore_created

- name: Determine old hub disposition
  ansible.builtin.set_fact:
    acm_switchover_old_hub_disposition:
      action: "{{ acm_switchover_operation.old_hub_action | default('secondary') }}"
      changed: "{{ _old_hub_restore_created.changed | default(false) }}"
      message: >-
        {{
          'Old hub configured as secondary ACM hub with passive sync restore'
          if (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
          else 'Old hub scheduled for decommission'
          if (acm_switchover_operation.old_hub_action | default('secondary')) == 'decommission'
          else 'No action taken on old hub'
        }}
