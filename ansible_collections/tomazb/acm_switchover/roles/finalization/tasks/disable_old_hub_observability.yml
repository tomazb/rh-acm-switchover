---
- name: Initialize old hub observability disable result
  ansible.builtin.set_fact:
    acm_switchover_disable_old_hub_observability_result:
      changed: false
      deleted_mcos: []
      status: pass

- name: Announce old hub MCO deletion (dry_run)
  ansible.builtin.debug:
    msg: >-
      [dry_run] Would delete MultiClusterObservability on the old hub and wait
      for observability pods to terminate.
  when: acm_switchover_execution.mode | default('execute') == 'dry_run'

- name: Read old hub MultiClusterObservability resources
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
  register: _acm_old_hub_mco_info
  failed_when: false
  when: acm_switchover_execution.mode | default('execute') != 'dry_run'

- name: Warn that GitOps-managed MCO deletion must be coordinated
  ansible.builtin.debug:
    msg: >-
      MultiClusterObservability {{ item.metadata.name | default('observability') }}
      may be managed declaratively. Coordinate deletion to avoid GitOps drift if
      Argo CD or Flux recreates it on the old secondary hub.
    warn: true
  loop: "{{ _acm_old_hub_mco_info.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.name | default('observability') }}"
  when:
    - acm_switchover_execution.mode | default('execute') != 'dry_run'
    - not (acm_switchover_features.skip_gitops_check | default(false))

- name: Delete old hub MultiClusterObservability resources
  kubernetes.core.k8s:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ item.metadata.name }}"
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
    state: absent
  loop: "{{ _acm_old_hub_mco_info.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.name | default('observability') }}"
  register: _acm_old_hub_mco_delete_result
  when: acm_switchover_execution.mode | default('execute') != 'dry_run'

- name: Wait for old hub observability pods to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: open-cluster-management-observability
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
  register: _acm_old_hub_observability_pods_info
  retries: 30
  delay: 10
  until: (_acm_old_hub_observability_pods_info.resources | default([]) | length) == 0
  failed_when: false
  changed_when: false
  when:
    - acm_switchover_execution.mode | default('execute') != 'dry_run'
    - (_acm_old_hub_mco_info.resources | default([]) | length) > 0

- name: Warn when observability pods remain after MCO deletion
  ansible.builtin.debug:
    msg: >-
      Observability pods are still running on the old hub after deleting
      MultiClusterObservability. If GitOps is not recreating MCO, this may
      indicate a product bug.
    warn: true
  when:
    - acm_switchover_execution.mode | default('execute') != 'dry_run'
    - (_acm_old_hub_observability_pods_info.resources | default([]) | length) > 0

- name: Publish old hub observability disable result
  ansible.builtin.set_fact:
    acm_switchover_disable_old_hub_observability_result:
      changed: >-
        {{
          (_acm_old_hub_mco_delete_result.results | default([])
          | selectattr('changed')
          | list
          | length) > 0
        }}
      deleted_mcos: >-
        {%- set deleted = [] -%}
        {%- for result in (_acm_old_hub_mco_delete_result.results | default([])) -%}
        {%- if result.changed | default(false) and result.item is defined -%}
        {%- set _ = deleted.append(result.item.metadata.name) -%}
        {%- endif -%}
        {%- endfor -%}
        {{ deleted }}
      status: "{{ 'skipped' if acm_switchover_execution.mode | default('execute') == 'dry_run' else 'pass' }}"
