---
# Kubeconfig generation delegates to the existing shell script during the bridge period.
# Replace with a collection-native task once scripts/generate-sa-kubeconfig.sh is retired.
- name: Announce kubeconfig generation (dry_run)
  ansible.builtin.debug:
    msg: "[dry_run] Would run scripts/generate-sa-kubeconfig.sh to produce kubeconfigs"
  when: acm_switchover_execution.mode | default('') == 'dry_run'

- name: Generate kubeconfig from service account
  ansible.builtin.command:
    cmd: >-
      scripts/generate-sa-kubeconfig.sh
      --context {{ acm_switchover_hubs.primary.context }}
      --kubeconfig {{ acm_switchover_hubs.primary.kubeconfig }}
  changed_when: true
  when: acm_switchover_execution.mode | default('') != 'dry_run'
