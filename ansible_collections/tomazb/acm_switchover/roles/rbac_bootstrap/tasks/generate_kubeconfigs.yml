---
- name: Determine RBAC bootstrap kubeconfig target
  ansible.builtin.set_fact:
    _rbac_bootstrap_namespace: acm-switchover
    _rbac_bootstrap_service_account_name: >-
      {{
        'acm-switchover-operator'
        if acm_switchover_rbac_bootstrap.role == 'operator'
        else 'acm-switchover-validator'
      }}
    _rbac_bootstrap_context_slug: >-
      {{
        (acm_switchover_hubs.primary.context | default('primary', true))
        | regex_replace('[^A-Za-z0-9._-]', '_')
      }}
    _rbac_bootstrap_output_dir: "{{ acm_switchover_rbac_bootstrap.output_dir | default('./kubeconfigs') }}"
    _rbac_bootstrap_script: "{{ role_path }}/files/scripts/generate-sa-kubeconfig.sh"

- name: Determine RBAC bootstrap kubeconfig output path
  ansible.builtin.set_fact:
    _rbac_bootstrap_kubeconfig_path: >-
      {{
        (
          _rbac_bootstrap_output_dir,
          _rbac_bootstrap_context_slug ~ '-' ~ acm_switchover_rbac_bootstrap.role ~ '.yaml'
        ) | path_join
      }}
    _rbac_bootstrap_user_name: "{{ _rbac_bootstrap_context_slug }}-{{ acm_switchover_rbac_bootstrap.role }}"

- name: Announce kubeconfig generation (dry_run)
  ansible.builtin.debug:
    msg: >-
      [dry_run] Would run {{ _rbac_bootstrap_script }} for
      {{ _rbac_bootstrap_namespace }}/{{ _rbac_bootstrap_service_account_name }}
      and write {{ _rbac_bootstrap_kubeconfig_path }}
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: Ensure kubeconfig output directory exists
  ansible.builtin.file:
    path: "{{ _rbac_bootstrap_output_dir }}"
    state: directory
    mode: "0700"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Generate kubeconfig from service account
  ansible.builtin.command:
    argv:
      - /bin/bash
      - "{{ _rbac_bootstrap_script }}"
      - --context
      - "{{ acm_switchover_hubs.primary.context }}"
      - --kubeconfig
      - "{{ acm_switchover_hubs.primary.kubeconfig }}"
      - --user
      - "{{ _rbac_bootstrap_user_name }}"
      - --token-duration
      - "{{ acm_switchover_rbac_bootstrap.token_duration | default('48h') }}"
      - "{{ _rbac_bootstrap_namespace }}"
      - "{{ _rbac_bootstrap_service_account_name }}"
  register: _rbac_generated_kubeconfig
  changed_when: true
  no_log: true
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Write generated service account kubeconfig
  ansible.builtin.copy:
    content: "{{ _rbac_generated_kubeconfig.stdout }}"
    dest: "{{ _rbac_bootstrap_kubeconfig_path }}"
    mode: "0600"
  no_log: true
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Publish generated service account kubeconfig path
  ansible.builtin.set_fact:
    acm_switchover_rbac_bootstrap_generated_kubeconfig: "{{ _rbac_bootstrap_kubeconfig_path }}"
