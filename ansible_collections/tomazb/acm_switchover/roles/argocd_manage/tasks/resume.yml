---
- name: Resume auto-sync on previously paused applications
  when: acm_switchover_argocd_installed | default(false)
  block:
    # Determine the expected run_id for marker safety — only resume apps we paused.
    - name: Resolve expected run_id for marker matching
      ansible.builtin.set_fact:
        _argocd_expected_run_id: >-
          {{ acm_switchover_argocd.run_id
             | default(acm_switchover_execution.run_id | default('')) }}

    # In mock mode (integration testing without a real cluster), count all provided
    # apps as restored (the fixture ensures they all have the pause annotation).
    - name: Record mock resume summary
      ansible.builtin.set_fact:
        acm_switchover_argocd_summary:
          paused: 0
          restored: "{{ acm_switchover_argocd_acm_apps | length }}"
      when: acm_switchover_argocd_mock_apps is defined

    # Live mode: iterate apps that have the pause annotation AND whose run_id matches.
    # The complex key name (acm-switchover.argoproj.io/paused-by) cannot be used with
    # selectattr because Jinja2 interprets dots as nested attribute access.
    - name: Restore original sync policy and remove pause annotations
      kubernetes.core.k8s:
        kubeconfig: "{{ acm_switchover_hubs[_argocd_discover_hub | default('secondary')].kubeconfig | default(omit) }}"
        context: "{{ acm_switchover_hubs[_argocd_discover_hub | default('secondary')].context | default(omit) }}"
        state: patched
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ item.metadata.namespace }}"
        name: "{{ item.metadata.name }}"
        definition:
          metadata:
            annotations:
              acm-switchover.argoproj.io/paused-by: null
              acm-switchover.argoproj.io/original-sync-policy: null
          spec:
            syncPolicy: >-
              {{
                item.metadata.annotations['acm-switchover.argoproj.io/original-sync-policy']
                | default('{}')
                | from_json
              }}
      loop: "{{ acm_switchover_argocd_all_apps | default([]) | selectattr('metadata.annotations', 'defined') | list }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when:
        - acm_switchover_argocd_mock_apps is not defined
        - "'acm-switchover.argoproj.io/paused-by' in item.metadata.annotations"
        - >-
          _argocd_expected_run_id == ''
          or item.metadata.annotations['acm-switchover.argoproj.io/paused-by'] == _argocd_expected_run_id
      register: acm_argocd_resume_results

    - name: Warn about apps paused by a different run
      ansible.builtin.debug:
        msg: >-
          Skipped {{ item.metadata.namespace }}/{{ item.metadata.name }} —
          paused by run_id '{{ item.metadata.annotations['acm-switchover.argoproj.io/paused-by'] }}'
          (expected '{{ _argocd_expected_run_id }}')
      loop: "{{ acm_switchover_argocd_all_apps | default([]) | selectattr('metadata.annotations', 'defined') | list }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      when:
        - acm_switchover_argocd_mock_apps is not defined
        - _argocd_expected_run_id != ''
        - "'acm-switchover.argoproj.io/paused-by' in item.metadata.annotations"
        - item.metadata.annotations['acm-switchover.argoproj.io/paused-by'] != _argocd_expected_run_id

    - name: Record resume summary
      ansible.builtin.set_fact:
        acm_switchover_argocd_summary:
          paused: 0
          restored: "{{ acm_argocd_resume_results.results | default([]) | selectattr('changed') | list | length }}"
      when: acm_switchover_argocd_mock_apps is not defined
