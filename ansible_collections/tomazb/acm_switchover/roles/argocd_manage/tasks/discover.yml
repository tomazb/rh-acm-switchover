---
# Use pre-supplied mock apps when provided (for testing without a live cluster).
- name: Use pre-supplied application list
  when: acm_switchover_argocd_mock_apps is defined
  block:
    - name: Filter mock apps to ACM-touching only
      tomazb.acm_switchover.acm_argocd_filter:
        applications: "{{ acm_switchover_argocd_mock_apps }}"
      register: _argocd_mock_filtered

    - name: Record filtered mock apps
      ansible.builtin.set_fact:
        acm_switchover_argocd_installed: true
        acm_switchover_argocd_acm_apps: "{{ _argocd_mock_filtered.applications }}"
        acm_switchover_argocd_all_apps: "{{ acm_switchover_argocd_mock_apps }}"

- name: Discover Argo CD Applications from cluster
  when: acm_switchover_argocd_mock_apps is not defined
  block:
    - name: Generate run_id if not provided
      ansible.builtin.set_fact:
        acm_switchover_argocd: >-
          {{
            acm_switchover_argocd | default({})
            | combine({'run_id': lookup('pipe', 'python3 -c "import uuid; print(uuid.uuid4().hex[:12])"')})
          }}
      when:
        - (acm_switchover_argocd.run_id | default('')) == ''
        - (acm_switchover_argocd_mode_override | default(acm_switchover_argocd.mode | default('pause'))) != 'resume'

    - name: List Applications in Argo CD namespace
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ acm_switchover_argocd.namespace | default(omit) }}"
        kubeconfig: "{{ acm_switchover_hubs[_argocd_discover_hub | default('primary')].kubeconfig | default(omit) }}"
        context: "{{ acm_switchover_hubs[_argocd_discover_hub | default('primary')].context | default(omit) }}"
      register: _argocd_app_list

    - name: Filter to ACM-touching applications
      tomazb.acm_switchover.acm_argocd_filter:
        applications: "{{ _argocd_app_list.resources | default([]) }}"
      register: _argocd_live_filtered

    - name: Record discovered ACM apps
      ansible.builtin.set_fact:
        acm_switchover_argocd_installed: true
        acm_switchover_argocd_acm_apps: "{{ _argocd_live_filtered.applications }}"
        acm_switchover_argocd_all_apps: "{{ _argocd_app_list.resources | default([]) }}"

  rescue:
    - name: Check if failure is due to missing Argo CD CRD
      ansible.builtin.set_fact:
        _argocd_discovery_error: "{{ ansible_failed_result.msg | default(ansible_failed_result | string) | default('') }}"

    - name: Mark Argo CD as not installed (CRD absent)
      ansible.builtin.set_fact:
        acm_switchover_argocd_installed: false
        acm_switchover_argocd_acm_apps: []
        acm_switchover_argocd_all_apps: []
      when: >-
        'the server doesn\'t have a resource type' in (_argocd_discovery_error | lower)
        or 'could not find the requested resource' in (_argocd_discovery_error | lower)
        or 'no matches for kind "application" in group "argoproj.io"' in (_argocd_discovery_error | lower)

    - name: Fail on unexpected Argo CD discovery error
      ansible.builtin.fail:
        msg: >-
          Argo CD discovery failed with an unexpected error (not a missing CRD).
          If argocd.manage is enabled, this must be investigated before proceeding.
          Error: {{ _argocd_discovery_error }}
      when: >-
        'the server doesn\'t have a resource type' not in (_argocd_discovery_error | lower)
        and 'could not find the requested resource' not in (_argocd_discovery_error | lower)
        and 'no matches for kind "application" in group "argoproj.io"' not in (_argocd_discovery_error | lower)

- name: Report when Argo CD is not installed
  ansible.builtin.debug:
    msg: "Argo CD not detected; skipping argocd_manage role actions."
  when: not (acm_switchover_argocd_installed | default(false))
