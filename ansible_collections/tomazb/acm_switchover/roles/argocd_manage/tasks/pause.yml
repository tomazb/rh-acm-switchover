---
- name: Pause auto-sync on discovered applications
  when: acm_switchover_argocd_installed | default(false)
  block:
    - name: Remove automated sync policy and annotate with run-id
      kubernetes.core.k8s:
        state: patched
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ item.metadata.namespace }}"
        name: "{{ item.metadata.name }}"
        definition:
          metadata:
            annotations:
              acm-switchover.argoproj.io/paused-by: "{{ acm_switchover_argocd.run_id }}"
              acm-switchover.argoproj.io/original-sync-policy: >-
                {{ item.spec.syncPolicy | default({}) | to_json }}
          spec:
            syncPolicy: >-
              {{
                (item.spec.syncPolicy | default({}))
                | combine({'automated': omit}, recursive=true)
                | dict2items
                | rejectattr('key', 'equalto', 'automated')
                | items2dict
              }}
      loop: "{{ acm_switchover_argocd_acm_apps }}"
      loop_control:
        label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
      register: acm_argocd_pause_results

    - name: Record pause summary
      ansible.builtin.set_fact:
        acm_switchover_argocd_summary:
          paused: "{{ acm_argocd_pause_results.results | selectattr('changed') | list | length }}"
          restored: 0
