---
acm_switchover_hubs:
  primary:
    context: ""
    kubeconfig: ""
  secondary:
    context: ""
    kubeconfig: ""

acm_switchover_execution:
  mode: execute
  verbose: false
  force: false
  report_dir: ./artifacts
  checkpoint:
    enabled: false
    backend: file
    path: .state/switchover.json
    reset: false

acm_switchover_features:
  manage_auto_import_strategy: false
  skip_observability_checks: false
  skip_gitops_check: false
  skip_rbac_validation: false
  disable_observability_on_secondary: false
  argocd:
    manage: false

# Optional: kubeconfigs for managed clusters to enable automatic klusterlet
# remediation. Without this, pending clusters get a warning only.
# Format:
#   acm_switchover_managed_clusters:
#     cluster1:
#       kubeconfig: "/path/to/cluster1-kubeconfig"
#       context: ""  # optional, uses default context if omitted
acm_switchover_managed_clusters: {}
