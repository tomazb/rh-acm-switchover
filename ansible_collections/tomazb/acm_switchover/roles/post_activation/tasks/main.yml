---
- name: Enter checkpointed phase
  tomazb.acm_switchover.checkpoint_phase:
    phase: post_activation
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: enter
  register: _checkpoint_enter
  when: acm_switchover_execution.checkpoint.enabled | default(false)

- name: Run post_activation phase
  when: not ((_checkpoint_enter | default({})).skipped_phase | default(false))
  block:
    - name: Discover secondary hub resources
      ansible.builtin.include_tasks: discover_resources.yml

    - name: Verify managed clusters
      ansible.builtin.include_tasks: verify_managed_clusters.yml

    - name: Verify klusterlet status
      ansible.builtin.include_tasks: verify_klusterlet.yml

    - name: Re-verify managed clusters after klusterlet remediation
      ansible.builtin.include_tasks: verify_managed_clusters.yml
      when: _klusterlet_remediation_attempted | default(false)

    - name: Clean stale disable-auto-import annotations
      ansible.builtin.include_tasks: cleanup_auto_import_annotations.yml

    - name: Verify observability
      ansible.builtin.include_tasks: verify_observability.yml
      when: not (acm_switchover_features.skip_observability_checks | default(false))

    - name: Publish post activation result
      ansible.builtin.set_fact:
        acm_switchover_post_activation_result:
          phase: post_activation
          status: "{{ 'pass' if acm_cluster_verify_result.passed else 'fail' }}"
          changed: false
          summary: "{{ acm_cluster_verify_result }}"
          cleanup_auto_import: "{{ acm_switchover_cleanup_auto_import_result | default({}) }}"
          observability: "{{ acm_observability_check_result | default({}) }}"
      tags:
        - post_activation
        - verify

    - name: Fail if post activation checks did not pass
      ansible.builtin.fail:
        msg: "Post activation verification failed: {{ acm_cluster_verify_result.pending | join(', ') }} cluster(s) not ready"
      when: not acm_cluster_verify_result.passed
  rescue:
    - name: Mark checkpoint failure
      tomazb.acm_switchover.checkpoint_phase:
        phase: post_activation
        checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
        status: fail
        error: "{{ ansible_failed_result.msg | default('unknown failure') }}"
      when: acm_switchover_execution.checkpoint.enabled | default(false)

    - name: Re-raise failure
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('Phase post_activation failed') }}"

- name: Mark checkpoint phase completion
  # No file artifact for post_activation; report_ref not applicable
  tomazb.acm_switchover.checkpoint_phase:
    phase: post_activation
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: pass
  when:
    - acm_switchover_execution.checkpoint.enabled | default(false)
    - not ((_checkpoint_enter | default({})).skipped_phase | default(false))
