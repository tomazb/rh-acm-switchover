---
# After a Velero MC restore, the hub re-creates ManagedCluster objects with
# status from the backup snapshot (often Available=True from the old primary).
# The hub reconciler needs time to detect actual klusterlet connectivity and
# update the condition to reflect reality.  Without this pause, the first
# k8s_info query catches the stale backup status and the poll completes
# immediately even though the clusters have not reconnected.
- name: Wait for hub reconciler to update managed-cluster status after activation
  ansible.builtin.pause:
    seconds: 30

# Poll until ALL non-local-cluster MCs are both Available=True AND Joined=True,
# matching the Python tool's _verify_managed_clusters_connected() totality check.
# Budget: 20 retries × 30 s = 600 s = CLUSTER_VERIFY_TIMEOUT.
#
# Top-level guard: resources must be non-empty before we can exit the loop.
# An empty list means no ManagedClusters have been discovered yet — keep polling.
# This mirrors Python: `if not managed_clusters: return False, "no ManagedClusters found"`.
#
# Inner check:
#   - If resources exist but only local-cluster: exit immediately (no managed clusters
#     to wait for). Mirrors Python: `if total_clusters == 0: return True`.
#   - Otherwise: wait until every non-local cluster is Available=True AND Joined=True.
- name: Wait for managed clusters to become available and joined
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
  register: acm_secondary_managed_clusters_info
  retries: 20
  delay: 30
  until: >-
    (acm_secondary_managed_clusters_info.resources | default([]) | length) > 0
    and
    (
      (acm_secondary_managed_clusters_info.resources | default([])
       | selectattr('metadata.name', 'ne', 'local-cluster') | list | length) == 0
      or
      (
        (acm_secondary_managed_clusters_info.resources | default([])
         | selectattr('metadata.name', 'ne', 'local-cluster')
         | map(attribute='status', default={})
         | map(attribute='conditions', default=[])
         | flatten
         | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable')
         | selectattr('status', 'equalto', 'True')
         | list | length)
        ==
        (acm_secondary_managed_clusters_info.resources | default([])
         | selectattr('metadata.name', 'ne', 'local-cluster') | list | length)
        and
        (acm_secondary_managed_clusters_info.resources | default([])
         | selectattr('metadata.name', 'ne', 'local-cluster')
         | map(attribute='status', default={})
         | map(attribute='conditions', default=[])
         | flatten
         | selectattr('type', 'equalto', 'ManagedClusterJoined')
         | selectattr('status', 'equalto', 'True')
         | list | length)
        ==
        (acm_secondary_managed_clusters_info.resources | default([])
         | selectattr('metadata.name', 'ne', 'local-cluster') | list | length)
      )
    )

- name: Summarize managed cluster conditions
  tomazb.acm_switchover.acm_managedcluster_status:
    clusters: "{{ acm_secondary_managed_clusters_info.resources | default([]) }}"
  register: cluster_status_result

- name: Verify managed cluster group readiness
  tomazb.acm_switchover.acm_cluster_verify:
    cluster_status: "{{ cluster_status_result.cluster_status }}"
    min_managed_clusters: "{{ acm_switchover_operation.min_managed_clusters | default(0) | int }}"
  register: acm_cluster_verify_result
