---
# Mirrors Python _apply_immediate_import_annotations() in modules/activation.py.
# When autoImportStrategy is ImportOnly (ACM 2.14+ default), apply the
# immediate-import annotation to each non-local ManagedCluster so the
# import controller processes them without waiting for the next sync.
- name: Skip immediate-import annotation management in dry-run mode
  ansible.builtin.set_fact:
    _apply_immediate_import: false
    acm_switchover_immediate_import_result:
      changed: false
      mode: "{{ acm_switchover_operation.activation_method | default('patch') }}"
      skipped: true
      reason: dry_run
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: Derive secondary ACM version for immediate-import annotations
  ansible.builtin.set_fact:
    _acm_secondary_version: >-
      {{
        acm_secondary_version
        | default(
            (
              (acm_secondary_mch_info.resources | default([]) | first | default({}))
              .get('status', {})
              .get('currentVersion', '')
            ),
            true
          )
      }}

- name: Determine whether secondary ACM supports immediate-import annotations
  ansible.builtin.set_fact:
    _acm_secondary_supports_auto_import: >-
      {{
        (_acm_secondary_version | length > 0)
        and (_acm_secondary_version is version('2.14.0', '>='))
      }}

- name: Publish immediate import skip result for older ACM versions
  ansible.builtin.set_fact:
    _apply_immediate_import: false
    acm_switchover_immediate_import_result:
      changed: false
      mode: "{{ acm_switchover_operation.activation_method | default('patch') }}"
      skipped: true
      reason: "ACM {{ _acm_secondary_version | default('unknown') }} does not support immediate-import annotations"
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - not (_acm_secondary_supports_auto_import | bool)

- name: Get current autoImportStrategy
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: import-controller-config
    namespace: multicluster-engine
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
  register: _import_cm_for_annotation
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool

- name: Determine if immediate-import annotations are needed
  ansible.builtin.set_fact:
    _apply_immediate_import: >-
      {{ (_import_cm_for_annotation.resources | default([]) | first | default({}))
         .get('data', {}).get('autoImportStrategy', 'ImportOnly')
         in ['ImportOnly', 'default', ''] }}
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool

- name: Get ManagedClusters on secondary hub
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
  register: _mc_for_import
  when:
    - _apply_immediate_import | default(false) | bool
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool

- name: Apply immediate-import annotation to non-local clusters
  kubernetes.core.k8s:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: "{{ item.metadata.name }}"
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
    state: patched
    definition:
      metadata:
        annotations:
          import.open-cluster-management.io/immediate-import: ""
  loop: >-
    {{ (_mc_for_import.resources | default([]))
       | rejectattr('metadata.name', 'equalto', 'local-cluster')
       | list }}
  loop_control:
    label: "{{ item.metadata.name }}"
  register: acm_apply_immediate_import_results
  when:
    - _apply_immediate_import | default(false) | bool
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool

- name: Publish immediate import result
  ansible.builtin.set_fact:
    acm_switchover_immediate_import_result:
      changed: "{{ acm_apply_immediate_import_results.changed | default(false) }}"
      mode: "{{ acm_switchover_operation.activation_method | default('patch') }}"
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
