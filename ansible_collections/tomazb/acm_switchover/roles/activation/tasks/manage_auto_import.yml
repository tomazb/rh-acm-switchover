---
# Mirrors Python _maybe_set_auto_import_strategy() in modules/activation.py.
# For ACM 2.14+, temporarily set autoImportStrategy=ImportAndSync so
# clusters restored from backup are immediately re-imported by the hub.
- name: Initialize auto-import strategy management state
  ansible.builtin.set_fact:
    _auto_import_strategy_changed: false

- name: Derive secondary ACM version for auto-import strategy management
  ansible.builtin.set_fact:
    _acm_secondary_version: >-
      {{
        acm_secondary_version
        | default(
            (
              (acm_secondary_mch_info.resources | default([]) | first | default({}))
              .get('status', {})
              .get('currentVersion', '')
            ),
            true
          )
      }}

- name: Determine whether secondary ACM supports auto-import strategy
  ansible.builtin.set_fact:
    _acm_secondary_supports_auto_import: >-
      {{
        (_acm_secondary_version | length > 0)
        and (_acm_secondary_version is version('2.14.0', '>='))
      }}

- name: Initialize auto-import candidate list
  ansible.builtin.set_fact:
    _auto_import_non_local_clusters: []

- name: Read ManagedClusters on secondary hub for auto-import strategy guard
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context | default(omit) }}"
  register: _auto_import_managed_clusters
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'

- name: Collect non-local ManagedClusters for auto-import strategy guard
  ansible.builtin.set_fact:
    _auto_import_non_local_clusters: >-
      {{
        _auto_import_managed_clusters.resources
        | default([])
        | rejectattr('metadata.name', 'equalto', 'local-cluster')
        | list
      }}
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'

- name: Read import-controller-config ConfigMap
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: import-controller-config
    namespace: multicluster-engine
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context | default(omit) }}"
  register: _import_controller_cm
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - (_auto_import_non_local_clusters | length) > 0

- name: Determine current autoImportStrategy
  ansible.builtin.set_fact:
    _auto_import_current_strategy: >-
      {{ (_import_controller_cm.resources | default([]) | first | default({}))
         .get('data', {}).get('autoImportStrategy', 'default') }}
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - (_auto_import_non_local_clusters | length) > 0

- name: Detect-only autoImportStrategy guidance
  ansible.builtin.debug:
    msg: >-
      Detect-only: destination hub has existing clusters with default autoImportStrategy;
      set acm_switchover_features.manage_auto_import_strategy=true to temporarily use ImportAndSync.
  when:
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - (_auto_import_non_local_clusters | length) > 0
    - _auto_import_current_strategy != 'ImportAndSync'
    - not (acm_switchover_features.manage_auto_import_strategy | default(false) | bool)

- name: Set autoImportStrategy to ImportAndSync
  kubernetes.core.k8s:
    api_version: v1
    kind: ConfigMap
    name: import-controller-config
    namespace: multicluster-engine
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: import-controller-config
        namespace: multicluster-engine
      data:
        autoImportStrategy: ImportAndSync
  register: _auto_import_patched
  when:
    - _auto_import_current_strategy != 'ImportAndSync'
    - acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    - _acm_secondary_supports_auto_import | bool
    - (acm_switchover_operation.old_hub_action | default('secondary')) == 'secondary'
    - (_auto_import_non_local_clusters | length) > 0
    - acm_switchover_features.manage_auto_import_strategy | default(false) | bool

- name: Record strategy change for later reset
  ansible.builtin.set_fact:
    _auto_import_strategy_changed: true
  when: _auto_import_patched is changed
