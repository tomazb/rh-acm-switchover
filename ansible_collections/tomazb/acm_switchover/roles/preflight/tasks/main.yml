---
- name: Enter checkpointed phase
  tomazb.acm_switchover.checkpoint_phase:
    phase: preflight
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: enter
  when: acm_switchover_execution.checkpoint.enabled | default(false)

- name: Run preflight phase
  block:
    - name: Initialize preflight result accumulator
      ansible.builtin.set_fact:
        acm_switchover_validation_results: []
        acm_switchover_preflight_summary:
          passed: true
          critical_failures: 0
          warning_failures: 0

    - name: Validate controller-side inputs
      ansible.builtin.include_tasks: validate_inputs.yml

    - name: Discover resources needed by later preflight checks
      ansible.builtin.include_tasks: discover_resources.yml
      when: acm_switchover_preflight_summary.passed

    - name: Validate kubeconfig reachability
      ansible.builtin.include_tasks: validate_kubeconfigs.yml
      when: acm_switchover_preflight_summary.passed

    - name: Validate ACM version compatibility
      ansible.builtin.include_tasks: validate_versions.yml
      when: acm_switchover_preflight_summary.passed

    - name: Validate required namespaces and base hub components
      ansible.builtin.include_tasks: validate_namespaces.yml
      when: acm_switchover_preflight_summary.passed

    - name: Validate RBAC permissions when enabled
      ansible.builtin.include_tasks: validate_rbac.yml
      when:
        - acm_switchover_preflight_summary.passed
        - not (acm_switchover_features.skip_rbac_validation | default(false))

    - name: Validate backup, restore, and cluster backup prerequisites
      ansible.builtin.include_tasks: validate_backups.yml
      when: acm_switchover_preflight_summary.passed

    - name: Recompute aggregate preflight summary from collected results
      ansible.builtin.set_fact:
        acm_switchover_preflight_summary:
          passed: >-
            {{
              (
                acm_switchover_validation_results
                | selectattr('severity', 'equalto', 'critical')
                | selectattr('status', 'in', ['fail', 'error'])
                | list
                | length
              ) == 0
            }}
          critical_failures: >-
            {{
              acm_switchover_validation_results
              | selectattr('severity', 'equalto', 'critical')
              | selectattr('status', 'in', ['fail', 'error'])
              | list
              | length
            }}
          warning_failures: >-
            {{
              acm_switchover_validation_results
              | selectattr('severity', 'equalto', 'warning')
              | selectattr('status', 'in', ['fail', 'error'])
              | list
              | length
            }}

    - name: Persist report and summary facts
      ansible.builtin.include_tasks: write_report.yml

    - name: Stop on critical preflight failures
      ansible.builtin.fail:
        msg: >-
          Preflight failed with {{ acm_switchover_preflight_summary.critical_failures }} critical finding(s).
          See {{ acm_switchover_preflight_report.path }} for details.
      when: not acm_switchover_preflight_summary.passed
  rescue:
    - name: Mark checkpoint failure
      tomazb.acm_switchover.checkpoint_phase:
        phase: preflight
        checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
        status: fail
        error: "{{ ansible_failed_result.msg | default('unknown failure') }}"
      when: acm_switchover_execution.checkpoint.enabled | default(false)

    - name: Re-raise failure
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('Phase preflight failed') }}"

- name: Mark checkpoint phase completion
  tomazb.acm_switchover.checkpoint_phase:
    phase: preflight
    checkpoint: "{{ acm_switchover_execution.checkpoint | default({}) }}"
    status: pass
    report_ref: "{{ acm_switchover_preflight_result.path | default(omit) }}"
  when: acm_switchover_execution.checkpoint.enabled | default(false)
