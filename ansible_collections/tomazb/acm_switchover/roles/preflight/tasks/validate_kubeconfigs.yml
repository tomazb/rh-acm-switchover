---
- name: Probe primary hub API reachability directly
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: default
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
  register: _acm_primary_connectivity_info
  failed_when: false
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Probe secondary hub API reachability directly
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: default
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
  register: _acm_secondary_connectivity_info
  failed_when: false

- name: Record primary-hub connectivity result from direct API probe
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-kubeconfig-primary-connectivity",
            "severity": "critical",
            "status": "pass" if (_acm_primary_connectivity_info.failed | default(false) | bool) == false else "fail",
            "message": "primary hub API connectivity validated"
              if (_acm_primary_connectivity_info.failed | default(false) | bool) == false
              else "primary hub API connectivity probe failed",
            "details": {"context": acm_switchover_hubs.primary.context},
            "recommended_action": none
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Inspect primary kubeconfig token expiry
  tomazb.acm_switchover.acm_kubeconfig_inspect:
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context }}"
    warning_hours: "{{ acm_switchover_features.token_expiry_warning_hours }}"
  register: _acm_primary_token_expiry_result
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record primary kubeconfig token expiry result
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-kubeconfig-primary-token-expiry",
            "severity": _acm_primary_token_expiry_result.severity,
            "status": _acm_primary_token_expiry_result.status,
            "message": _acm_primary_token_expiry_result.message,
            "details": _acm_primary_token_expiry_result.details,
            "recommended_action": (
              "Regenerate the primary hub kubeconfig or service-account token before switchover."
              if _acm_primary_token_expiry_result.status in ["fail", "warn"]
              else none
            )
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record secondary-hub connectivity result from direct API probe
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-kubeconfig-secondary-connectivity",
            "severity": "critical",
            "status": "pass" if (_acm_secondary_connectivity_info.failed | default(false) | bool) == false else "fail",
            "message": "secondary hub API connectivity validated"
              if (_acm_secondary_connectivity_info.failed | default(false) | bool) == false
              else "secondary hub API connectivity probe failed",
            "details": {"context": acm_switchover_hubs.secondary.context},
            "recommended_action": none
          }
        ]
      }}

- name: Inspect secondary kubeconfig token expiry
  tomazb.acm_switchover.acm_kubeconfig_inspect:
    kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.secondary.context }}"
    warning_hours: "{{ acm_switchover_features.token_expiry_warning_hours }}"
  register: _acm_secondary_token_expiry_result

- name: Record secondary kubeconfig token expiry result
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-kubeconfig-secondary-token-expiry",
            "severity": _acm_secondary_token_expiry_result.severity,
            "status": _acm_secondary_token_expiry_result.status,
            "message": _acm_secondary_token_expiry_result.message,
            "details": _acm_secondary_token_expiry_result.details,
            "recommended_action": (
              "Regenerate the secondary hub kubeconfig or service-account token before switchover."
              if _acm_secondary_token_expiry_result.status in ["fail", "warn"]
              else none
            )
          }
        ]
      }}
