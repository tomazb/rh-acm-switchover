---
- name: Expand required RBAC permissions for primary hub
  tomazb.acm_switchover.acm_rbac_validate:
    hub: primary
    role: "{{ acm_switchover_rbac.role | default('operator') }}"
    include_decommission: "{{ acm_switchover_operation.old_hub_action | default('secondary') == 'decommission' }}"
    skip_observability: "{{ acm_switchover_features.skip_observability_checks | default(false) }}"
    argocd_mode: >-
      {{
        'manage'
        if acm_switchover_features.argocd.manage | default(false)
        else 'none'
      }}
    argocd_install_type: unknown
  register: _rbac_expanded_primary

- name: Run SelfSubjectAccessReview checks for primary hub
  ansible.builtin.include_tasks: run_ssar.yml
  vars:
    acm_rbac_permissions: "{{ _rbac_expanded_primary.permissions }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Collect denied permissions for primary hub
  ansible.builtin.set_fact:
    _rbac_denied_permissions_primary: "{{ _rbac_denied_permissions }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Set empty denied list in dry-run mode for primary
  ansible.builtin.set_fact:
    _rbac_denied_permissions_primary: []
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: Summarize RBAC validation results for primary hub
  tomazb.acm_switchover.acm_rbac_validate:
    hub: primary
    role: "{{ acm_switchover_rbac.role | default('operator') }}"
    include_decommission: "{{ acm_switchover_operation.old_hub_action | default('secondary') == 'decommission' }}"
    skip_observability: "{{ acm_switchover_features.skip_observability_checks | default(false) }}"
    argocd_mode: >-
      {{
        'manage'
        if acm_switchover_features.argocd.manage | default(false)
        else 'none'
      }}
    argocd_install_type: unknown
    denied_permissions: "{{ _rbac_denied_permissions_primary | default([]) }}"
  register: acm_primary_rbac_validation

# Secondary hub RBAC validation (where activation happens)
- name: Expand required RBAC permissions for secondary hub
  tomazb.acm_switchover.acm_rbac_validate:
    hub: secondary
    role: "{{ acm_switchover_rbac.role | default('operator') }}"
    include_decommission: false  # secondary hub never runs decommission
    skip_observability: "{{ acm_switchover_features.skip_observability_checks | default(false) }}"
    argocd_mode: 'none'  # Argo CD pause happens on primary, resume on secondary
    argocd_install_type: unknown
  register: _rbac_expanded_secondary

- name: Run SelfSubjectAccessReview checks for secondary hub
  ansible.builtin.include_tasks: run_ssar.yml
  vars:
    acm_rbac_permissions: "{{ _rbac_expanded_secondary.permissions }}"
    _ssar_target_kubeconfig: "{{ acm_switchover_hubs.secondary.kubeconfig }}"
    _ssar_target_context: "{{ acm_switchover_hubs.secondary.context }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Collect denied permissions for secondary hub
  ansible.builtin.set_fact:
    _rbac_denied_permissions_secondary: "{{ _rbac_denied_permissions }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Set empty denied list in dry-run mode for secondary
  ansible.builtin.set_fact:
    _rbac_denied_permissions_secondary: []
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: Summarize RBAC validation results for secondary hub
  tomazb.acm_switchover.acm_rbac_validate:
    hub: secondary
    role: "{{ acm_switchover_rbac.role | default('operator') }}"
    include_decommission: false
    skip_observability: "{{ acm_switchover_features.skip_observability_checks | default(false) }}"
    argocd_mode: 'none'
    argocd_install_type: unknown
    denied_permissions: "{{ _rbac_denied_permissions_secondary | default([]) }}"
  register: acm_secondary_rbac_validation

- name: Merge RBAC results into preflight accumulator
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        (acm_switchover_validation_results | default([]))
        + acm_primary_rbac_validation.results
        + acm_secondary_rbac_validation.results
      }}
    acm_switchover_preflight_summary:
      passed: >-
        {{
          (acm_switchover_preflight_summary.passed | default(true))
          and acm_primary_rbac_validation.passed
          and acm_secondary_rbac_validation.passed
        }}
      critical_failures: >-
        {{
          (acm_switchover_preflight_summary.critical_failures | default(0))
          + (0 if acm_primary_rbac_validation.passed else 1)
          + (0 if acm_secondary_rbac_validation.passed else 1)
        }}
      warning_failures: "{{ acm_switchover_preflight_summary.warning_failures | default(0) }}"
