---
- name: Record latest backup existence
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-backup-latest",
            "severity": "critical",
            "status": "pass" if (acm_primary_backups_info.resources | default([]) | length) > 0 else "fail",
            "message": "primary hub has at least one backup artifact"
              if (acm_primary_backups_info.resources | default([]) | length) > 0
              else "primary hub has no Velero backup artifacts",
            "details": {
              "backup_count": acm_primary_backups_info.resources | default([]) | length
            },
            "recommended_action": "Run or repair ACM backup jobs on the primary hub"
              if (acm_primary_backups_info.resources | default([]) | length) == 0
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record BackupSchedule presence
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-backup-schedule",
            "severity": "critical",
            "status": "pass" if (acm_primary_backup_schedules_info.resources | default([]) | length) > 0 else "fail",
            "message": "primary hub BackupSchedule exists"
              if (acm_primary_backup_schedules_info.resources | default([]) | length) > 0
              else "primary hub BackupSchedule is missing",
            "details": {
              "schedule_count": acm_primary_backup_schedules_info.resources | default([]) | length
            },
            "recommended_action": "Recreate the ACM BackupSchedule before switchover"
              if (acm_primary_backup_schedules_info.resources | default([]) | length) == 0
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record BackupSchedule managed service account configuration
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-backup-schedule-use-managed-service-account",
            "severity": "critical",
            "status": "skip"
              if acm_switchover_operation.method == 'full'
              else (
                "pass"
                if (
                  (acm_primary_backup_schedules_info.resources | default([]) | length) > 0
                  and ((acm_primary_backup_schedules_info.resources | first | default({})).get('spec', {}).get('useManagedServiceAccount', false) | bool)
                )
                else "fail"
              ),
            "message": "BackupSchedule useManagedServiceAccount=true"
              if (
                acm_switchover_operation.method != 'full'
                and (acm_primary_backup_schedules_info.resources | default([]) | length) > 0
                and ((acm_primary_backup_schedules_info.resources | first | default({})).get('spec', {}).get('useManagedServiceAccount', false) | bool)
              )
              else (
                "useManagedServiceAccount not required for full restore"
                if acm_switchover_operation.method == 'full'
                else "BackupSchedule useManagedServiceAccount is not enabled"
              ),
            "details": {
              "method": acm_switchover_operation.method,
              "useManagedServiceAccount": ((acm_primary_backup_schedules_info.resources | first | default({})).get('spec', {}).get('useManagedServiceAccount', false) | bool)
            },
            "recommended_action": "Set spec.useManagedServiceAccount=true in the primary BackupSchedule before passive switchover"
              if (
                acm_switchover_operation.method != 'full'
                and (
                  (acm_primary_backup_schedules_info.resources | default([]) | length) == 0
                  or not ((acm_primary_backup_schedules_info.resources | first | default({})).get('spec', {}).get('useManagedServiceAccount', false) | bool)
                )
              )
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record primary hub BackupStorageLocation health
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-backup-storage-location-primary",
            "severity": "critical",
            "status": "pass"
              if (
                (acm_primary_bsl_info.resources | default([]) | length) > 0
                and ((acm_primary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) == 0
              )
              else "fail",
            "message": "primary hub BackupStorageLocations are available"
              if (
                (acm_primary_bsl_info.resources | default([]) | length) > 0
                and ((acm_primary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) == 0
              )
              else "primary hub BackupStorageLocation is missing or unavailable",
            "details": {
              "phases": acm_primary_bsl_info.resources | default([]) | map(attribute='status.phase', default='Unknown') | list
            },
            "recommended_action": "Repair object storage access before switchover"
              if (
                (acm_primary_bsl_info.resources | default([]) | length) == 0
                or ((acm_primary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) > 0
              )
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record secondary hub BackupStorageLocation health
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-backup-storage-location-secondary",
            "severity": "critical",
            "status": "pass"
              if (
                (acm_secondary_bsl_info.resources | default([]) | length) > 0
                and ((acm_secondary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) == 0
              )
              else "fail",
            "message": "secondary hub BackupStorageLocations are available"
              if (
                (acm_secondary_bsl_info.resources | default([]) | length) > 0
                and ((acm_secondary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) == 0
              )
              else "secondary hub BackupStorageLocation is missing or unavailable",
            "details": {
              "phases": acm_secondary_bsl_info.resources | default([]) | map(attribute='status.phase', default='Unknown') | list
            },
            "recommended_action": "Repair object storage access on the secondary hub before switchover"
              if (
                (acm_secondary_bsl_info.resources | default([]) | length) == 0
                or ((acm_secondary_bsl_info.resources | map(attribute='status.phase', default='Unknown') | list) | difference(['Available']) | length) > 0
              )
              else None
          }
        ]
      }}

- name: Analyze passive sync restores on secondary hub
  tomazb.acm_switchover.acm_restore_info:
    restores: "{{ acm_secondary_restore_info.resources | default([]) }}"
  register: acm_preflight_passive_restore_analysis
  when: acm_switchover_operation.method != 'full'

- name: Record passive restore availability on secondary hub
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-passive-restore-secondary",
            "severity": "critical",
            "status": "pass"
              if (
                acm_switchover_operation.method == 'full'
                or (acm_preflight_passive_restore_analysis.sync_enabled_count | default(0)) > 0
              )
              else "fail",
            "message": "secondary hub passive sync restore is present"
              if (
                acm_switchover_operation.method == 'full'
                or (acm_preflight_passive_restore_analysis.sync_enabled_count | default(0)) > 0
              )
              else "secondary hub has no sync-enabled passive restore",
            "details": {
              "method": acm_switchover_operation.method,
              "restore_count": acm_secondary_restore_info.resources | default([]) | length,
              "sync_enabled_count": acm_preflight_passive_restore_analysis.sync_enabled_count | default(0)
            },
            "recommended_action": "Verify a Restore with syncRestoreWithNewBackups=true exists on the secondary hub"
              if (
                acm_switchover_operation.method != 'full'
                and (acm_preflight_passive_restore_analysis.sync_enabled_count | default(0)) == 0
              )
              else None
          }
        ]
      }}

- name: Record OADP operator presence on primary hub
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-oadp-primary",
            "severity": "critical",
            "status": "pass" if (acm_primary_velero_pods_info.resources | default([]) | length) > 0 else "fail",
            "message": "primary hub OADP/Velero pods are present"
              if (acm_primary_velero_pods_info.resources | default([]) | length) > 0
              else "primary hub backup namespace exists but no Velero pods were found",
            "details": {
              "velero_pod_count": acm_primary_velero_pods_info.resources | default([]) | length
            },
            "recommended_action": "Ensure OADP/Velero is installed and healthy on the primary hub"
              if (acm_primary_velero_pods_info.resources | default([]) | length) == 0
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

- name: Record OADP operator presence on secondary hub
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-oadp-secondary",
            "severity": "critical",
            "status": "pass" if (acm_secondary_velero_pods_info.resources | default([]) | length) > 0 else "fail",
            "message": "secondary hub OADP/Velero pods are present"
              if (acm_secondary_velero_pods_info.resources | default([]) | length) > 0
              else "secondary hub backup namespace exists but no Velero pods were found",
            "details": {
              "velero_pod_count": acm_secondary_velero_pods_info.resources | default([]) | length
            },
            "recommended_action": "Ensure OADP/Velero is installed and healthy on the secondary hub"
              if (acm_secondary_velero_pods_info.resources | default([]) | length) == 0
              else None
          }
        ]
      }}

- name: Record primary hub DataProtectionApplication status
  ansible.builtin.set_fact:
    acm_switchover_validation_results: >-
      {{
        acm_switchover_validation_results
        + [
          {
            "id": "preflight-dpa-primary",
            "severity": "critical",
            "status": "pass"
              if (
                (acm_primary_dpa_info.resources | default([]) | length) > 0
                and (
                  (
                    ((acm_primary_dpa_info.resources | first | default({}))
                    .get('status', {})
                    .get('conditions', []))
                    | selectattr('type', 'equalto', 'Reconciled')
                    | selectattr('status', 'equalto', 'True')
                    | list
                    | length
                  ) > 0
                )
              )
              else "fail",
            "message": "primary hub DataProtectionApplication is reconciled"
              if (
                (acm_primary_dpa_info.resources | default([]) | length) > 0
                and (
                  (
                    ((acm_primary_dpa_info.resources | first | default({}))
                    .get('status', {})
                    .get('conditions', []))
                    | selectattr('type', 'equalto', 'Reconciled')
                    | selectattr('status', 'equalto', 'True')
                    | list
                    | length
                  ) > 0
                )
              )
              else "primary hub DataProtectionApplication is missing or not reconciled",
            "details": {
              "dpa_count": acm_primary_dpa_info.resources | default([]) | length
            },
            "recommended_action": "Install OADP and ensure the primary DataProtectionApplication reports Reconciled=True"
              if (
                (acm_primary_dpa_info.resources | default([]) | length) == 0
                or (
                  (
                    ((acm_primary_dpa_info.resources | first | default({}))
                    .get('status', {})
                    .get('conditions', []))
                    | selectattr('type', 'equalto', 'Reconciled')
                    | selectattr('status', 'equalto', 'True')
                    | list
                    | length
                  ) == 0
                )
              )
              else None
          }
        ]
      }}
  when: not (acm_switchover_operation.restore_only | default(false))

