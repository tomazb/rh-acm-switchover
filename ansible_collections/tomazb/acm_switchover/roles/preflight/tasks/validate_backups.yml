                    | list
                    | length
                  ) > 0
                )
              )
              else "fail",
            "message": "secondary hub DataProtectionApplication is reconciled"
              if (
                (acm_secondary_dpa_info.resources | default([]) | length) > 0
                and (
                  (
                    ((acm_secondary_dpa_info.resources | first | default({}))
                    .get('status', {})
