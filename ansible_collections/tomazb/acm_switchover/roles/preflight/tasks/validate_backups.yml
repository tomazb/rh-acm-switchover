                    | selectattr('type', 'equalto', 'Reconciled')
                    | selectattr('status', 'equalto', 'True')
                    | list
                    | length
                  ) > 0
                )
              )
              else "secondary hub DataProtectionApplication is missing or not reconciled",
            "details": {
              "dpa_count": acm_secondary_dpa_info.resources | default([]) | length
