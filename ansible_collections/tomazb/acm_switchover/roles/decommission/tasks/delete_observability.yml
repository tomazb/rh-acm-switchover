---
- name: Announce observability deletion (dry_run)
  ansible.builtin.debug:
    msg: "[dry_run] Would delete all MultiClusterObservability resources"
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: List MultiClusterObservability resources
  kubernetes.core.k8s_info:
    kind: MultiClusterObservability
    api_version: observability.open-cluster-management.io/v1beta2
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context | default(omit) }}"
  register: _multiclusterobservability_resources
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Delete discovered MultiClusterObservability resources
  kubernetes.core.k8s:
    kind: MultiClusterObservability
    name: "{{ item.metadata.name }}"
    api_version: observability.open-cluster-management.io/v1beta2
    state: absent
    wait: true
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context | default(omit) }}"
  loop: "{{ _multiclusterobservability_resources.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'
