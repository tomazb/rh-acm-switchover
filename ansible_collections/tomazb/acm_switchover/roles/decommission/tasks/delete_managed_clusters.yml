---
- name: Announce managed cluster deletion (dry_run)
  ansible.builtin.debug:
    msg: "[dry_run] Would delete all non-local ManagedCluster resources"
  when: acm_switchover_execution.mode | default('dry_run') == 'dry_run'

- name: List ManagedClusters
  kubernetes.core.k8s_info:
    kind: ManagedCluster
    api_version: cluster.open-cluster-management.io/v1
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context | default(omit) }}"
  register: _managed_clusters
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Select non-local ManagedClusters for deletion
  ansible.builtin.set_fact:
    _managed_cluster_delete_targets: >-
      {{
        _managed_clusters.resources
        | default([])
        | rejectattr('metadata.name', 'equalto', 'local-cluster')
        | list
      }}
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Delete non-local ManagedClusters
  kubernetes.core.k8s:
    kind: ManagedCluster
    api_version: cluster.open-cluster-management.io/v1
    name: "{{ item.metadata.name }}"
    state: absent
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context | default(omit) }}"
  loop: "{{ _managed_cluster_delete_targets | default([]) }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'

- name: Wait for ManagedCluster finalizers to complete
  kubernetes.core.k8s_info:
    kind: ManagedCluster
    api_version: cluster.open-cluster-management.io/v1
    kubeconfig: "{{ acm_switchover_hubs.primary.kubeconfig }}"
    context: "{{ acm_switchover_hubs.primary.context | default(omit) }}"
  register: _managed_clusters_after_delete
  retries: 30
  delay: 10
  until: >-
    {{
      (
        _managed_clusters_after_delete.resources
        | default([])
        | rejectattr('metadata.name', 'equalto', 'local-cluster')
        | list
        | length
      ) == 0
    }}
  when: acm_switchover_execution.mode | default('dry_run') != 'dry_run'
    and (_managed_cluster_delete_targets | default([]) | length) > 0
