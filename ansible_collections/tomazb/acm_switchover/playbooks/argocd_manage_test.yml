---
# Integration test playbook: runs argocd_manage in pause then resume mode with
# mock apps (no real cluster required). Writes a JSON summary to summary_path.
- name: Test Argo CD pause and resume with mock apps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Pause autosync with mock apps
      ansible.builtin.include_role:
        name: tomazb.acm_switchover.argocd_manage
      vars:
        acm_switchover_argocd:
          mode: pause
          run_id: test-run-001

    - name: Record pause count
      ansible.builtin.set_fact:
        _test_paused: "{{ acm_switchover_argocd_summary.paused | int }}"

    - name: Resume autosync with annotated mock apps
      ansible.builtin.include_role:
        name: tomazb.acm_switchover.argocd_manage
      vars:
        acm_switchover_argocd_mock_apps: "{{ acm_switchover_argocd_mock_apps_for_resume }}"
        acm_switchover_argocd:
          mode: resume
          run_id: test-run-001

    - name: Resolve summary path to absolute
      ansible.builtin.set_fact:
        _acm_summary_path_abs: >-
          {{
            summary_path
            if summary_path.startswith('/')
            else (lookup('env', 'PWD') ~ '/' ~ summary_path)
          }}

    - name: Write summary file
      ansible.builtin.copy:
        content: >-
          {{
            {
              "paused": _test_paused | int,
              "restored": acm_switchover_argocd_summary.restored | int
            } | to_json
          }}
        dest: "{{ _acm_summary_path_abs }}"
        mode: "0644"
