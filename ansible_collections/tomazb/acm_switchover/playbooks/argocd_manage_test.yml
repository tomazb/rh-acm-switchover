---
# Integration test playbook: runs argocd_manage in pause then resume mode.
# When acm_switchover_argocd_mock_apps is defined, no cluster access is needed.
# Without mock apps, the role queries the live cluster (requires kubeconfig).
- name: Test Argo CD pause and resume
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Pause autosync
      ansible.builtin.include_role:
        name: tomazb.acm_switchover.argocd_manage
      vars:
        acm_switchover_argocd_mode_override: pause
        _argocd_discover_hub: primary

    - name: Record pause count
      ansible.builtin.set_fact:
        _test_paused: "{{ acm_switchover_argocd_summary.paused | int }}"

    - name: Resume autosync
      ansible.builtin.include_role:
        name: tomazb.acm_switchover.argocd_manage
      vars:
        acm_switchover_argocd_mode_override: resume
        _argocd_discover_hub: secondary

    - name: Resolve summary path to absolute
      ansible.builtin.set_fact:
        _acm_summary_path_abs: >-
          {{
            summary_path
            if summary_path.startswith('/')
            else (lookup('env', 'PWD') ~ '/' ~ summary_path)
          }}

    - name: Write summary file
      ansible.builtin.copy:
        content: >-
          {{
            {
              "paused": _test_paused | int,
              "restored": acm_switchover_argocd_summary.restored | int
            } | to_json
          }}
        dest: "{{ _acm_summary_path_abs }}"
        mode: "0644"
